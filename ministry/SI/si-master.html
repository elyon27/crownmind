<!DOCTYPE html>
<html lang="en">
<head>
<style>
.return-home{
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 999;
}

.return-home a{
  text-decoration:none;
  padding:10px 18px;
  background:#0b1220;
  color:#fff;
  border-radius:8px;
  font-weight:600;
  border:1px solid rgba(255,255,255,.15);
  transition:all .3s ease;
}

.return-home a:hover{
  background:#1d2b4f;
}
</style>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SI — Image Master Index</title>
  <style>
    :root{
      --bg:#061b3a;
      --panel:rgba(255,255,255,.06);
      --text:#eaf2ff;
      --muted:rgba(234,242,255,.7);
      --line:rgba(255,255,255,.12);
      --chip:rgba(255,255,255,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(900px 500px at 20% 10%, rgba(88,167,255,.18), transparent 60%),
                  radial-gradient(900px 500px at 80% 20%, rgba(0,255,200,.10), transparent 60%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    header{
      padding:26px 18px 10px;
      text-align:center;
    }
    header h1{
      margin:0 0 6px;
      font-size:22px;
      letter-spacing:.5px;
    }
    header p{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:14px 14px 30px;
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 12px 40px rgba(0,0,0,.25);
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:space-between;
      align-items:center;
      padding:12px 12px;
      border-bottom:1px solid var(--line);
    }
    .search{
      flex:1;
      min-width:240px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    input[type="search"]{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.18);
      color:var(--text);
      outline:none;
    }
    input[type="search"]::placeholder{color:rgba(234,242,255,.55)}
    .meta{
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }
    .pill{
      padding:6px 10px;
      background:var(--chip);
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--text);
      font-size:12px;
    }
    ul{
      list-style:none;
      margin:0;
      padding:0;
    }
    li{
      border-top:1px solid var(--line);
    }
    li:first-child{border-top:none;}
    a.filelink{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      padding:12px 14px;
      text-decoration:none;
      color:var(--text);
      transition:background .15s ease;
    }
    a.filelink:hover{
      background:rgba(255,255,255,.06);
    }
    .fname{
      font-weight:600;
      font-size:14px;
      word-break:break-all;
    }
    .ftype{
      color:var(--muted);
      font-size:12px;
      border:1px solid var(--line);
      padding:4px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.16);
    }
    .note{
      padding:12px 14px;
      color:var(--muted);
      font-size:13px;
      border-top:1px solid var(--line);
      line-height:1.45;
    }
    code{
      background:rgba(0,0,0,.20);
      padding:2px 6px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:8px;
    }
  </style>
</head>
<body>
  <div class="return-home">
  <a href="../../index.html">← Return Home</a>
  </div>
  <header>
    <h1>SI — Image Master Index</h1>
    <p>Click a filename to open its full-screen viewer.</p>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div class="search">
          <input id="q" type="search" placeholder="Search image filename..." />
        </div>
        <div class="meta">
          <span class="pill" id="countPill">0 files</span>
        </div>
      </div>

      <ul id="list"></ul>

      <div class="note">
        <div><strong>Setup:</strong> put your images in <code>ministry/SI/img/</code></div>
        <div style="margin-top:6px;">
          Then edit the <code>IMG_FILES</code> array below to match your filenames
          (example: <code>"logo.png"</code>, <code>"banner.jpg"</code>).
        </div>
      </div>
    </div>
  </div>

  <script>
  // ✅ Single source of truth for this page (must match si-img-view.html)
  const IMG_BASE = "ministry/SI/img/";
  const IMG_FILES = [
    "SI0001.jpg",
    "SI0002.jpg",
    "SI0003.jpg",
    "SI0004.jpg",
    "SI0005.jpg",
    "SI0006.jpg",
    "SI0007.jpg",
    "SI0008.jpg",
    "SI0009.jpg",
    "SI0010.jpg",
    "SI0011.jpg",
    "SI0012.jpg",
    "SI0013.jpg",
    "SI0014.jpg",
    "SI0015.jpg",
    "SI0016.jpg",
    "SI0017.jpg",
    "SI0018.jpg",
    "SI0019.jpg",
    "SI0020.jpg",
    "SI0021.jpg",
    "SI0022.jpg",
    "SI0023.jpg",
    "SI0024.jpg",
    "SI0025.jpg",
    "SI0026.jpg",
    "SI0027.jpg",
    "SI0028.jpg",
    "SI0029.jpg",
    "SI0030.jpg",
    "SI0031.jpg",
    "SI0032.jpg",
    "SI0033.jpg",
    "SI0034.jpg",
    "SI0035.jpg",
    "SI0036.jpg",
    "SI0037.jpg",
    "SI0038.jpg",
    "SI0039.jpg",
    "SI0040.jpg",
    "SI0041.jpg",
    "SI0042.jpg",
    "SI0043.jpg",
    "SI0044.jpg",
    "SI0045.jpg",
  ];

  const listEl = document.getElementById("list");
  const qEl = document.getElementById("q");
  const countPill = document.getElementById("countPill");

  function extOf(name){
    const m = name.toLowerCase().match(/\.([a-z0-9]+)$/);
    return m ? m[1] : "";
  }

  function render(){
    const q = (qEl.value || "").trim().toLowerCase();
    listEl.innerHTML = "";

    const filtered = IMG_FILES.filter(f => f.toLowerCase().includes(q));

    countPill.textContent = `${filtered.length} file${filtered.length === 1 ? "" : "s"}`;

    if(filtered.length === 0){
      const empty = document.createElement("li");
      empty.innerHTML = `
        <div style="padding:14px; color: rgba(234,242,255,.72);">
          No matches. (Update <code>IMG_FILES</code> in the script.)
        </div>`;
      listEl.appendChild(empty);
      return;
    }

    filtered.forEach(filename => {
      const li = document.createElement("li");
      const type = extOf(filename) || "img";
      // pass index too, so the viewer can start at the exact file immediately
      const index = IMG_FILES.indexOf(filename);
      li.innerHTML = `
        <a class="filelink" href="si-img-view.html?i=${index}&img=${encodeURIComponent(filename)}">
          <span class="fname">${filename}</span>
          <span class="ftype">${type}</span>
        </a>
      `;
      listEl.appendChild(li);
    });
  }

  qEl.addEventListener("input", render);
  render();
</script>
</body>
</html>
